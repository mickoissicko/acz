<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[APP_NAME]</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header id="TopBar">
        <div class="logo" style="font-weight: 900; letter-spacing: 2px;">ÁNIMEĈIKAZUN</div>
        <nav class="nav-tabs">
            <div class="nav-tab" data-tab="notes">Notes</div>
            <div class="nav-tab" data-tab="mangas">Mangas</div>
            <div class="nav-tab" data-tab="novels">Novels</div>
            <div class="nav-tab" data-tab="anime">Anime</div>
        </nav>
        <div class="user-status" style="font-size: 12px; opacity: 0.5;">Hi there!</div>
    </header>

    <!-- VIEWS -->
    <section id="mangasView" class="view">
        <h1 style="margin-bottom: 20px;">Library</h1>
        <div id="MangaGrid" class="grid"></div>
    </section>

    <section id="notesView" class="view">
        <div class="notes-container">
            <div id="NotesList" class="notes-list"></div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <textarea id="NoteEditor" placeholder="Start typing..."></textarea>
                <button onclick="CORE.saveNote()" class="card" style="background: var(--accent); font-weight: bold;">SAVE NODE</button>
            </div>
        </div>
    </section>

    <section id="novelsView" class="view"><h1>Novels Module [COMING_SOON]</h1></section>
    <section id="animeView" class="view"><h1>Anime Module [COMING_SOON]</h1></section>

    <!-- READER OVERLAY -->
    <div id="ReaderOverlay">
        <img id="ReaderImg" onclick="CORE.nextPage()">
        <div class="reader-controls">
            <span id="PageInfo">Page 1</span> | 
            <span onclick="CORE.closeReader()" style="cursor:pointer; color: var(--accent);">EXIT</span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
