<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁNIMEĈIKAZUN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --bg-deep: #050507;
            --surface-low: #0f0f13;
            --surface-high: #1a1a22;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --sidebar-w: 64px;
            --sidebar-expanded: 260px;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-deep); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #Sidebar {
            position: fixed; left: 0; top: 0; bottom: 0;
            width: var(--sidebar-w); background: var(--surface-low);
            border-right: 1px solid var(--border); z-index: 1000;
            display: flex; flex-direction: column; padding: 25px 0;
            overflow: hidden;
        }
        
        #Sidebar:hover {
            transition-delay: 1.75s; /* expand thingy */
            width: var(--sidebar-expanded);
            background: var(--surface-high);
            box-shadow: 40px 0 80px rgba(0,0,0,0.9);
        }

        .nav-item {
            display: flex; align-items: center; padding: 18px 22px;
            cursor: pointer; color: var(--text-dim); text-decoration: none;
            white-space: nowrap; font-weight: 600;
        }
        .nav-item i { min-width: 22px; font-style: normal; font-size: 20px; text-align: center; }
        .nav-item span { margin-left: 20px; opacity: 0; transform: translateX(-10px); }
        
        #Sidebar:hover .nav-item span { 
            opacity: 1; transform: translateX(0);
            transition-delay: 1.75s; 
        }

        .nav-item:hover, .nav-item.active { 
            color: var(--accent); 
            background: rgba(0, 229, 255, 0.08); 
        }

        main { margin-left: var(--sidebar-w); padding: 60px; height: 100vh; overflow-y: auto; }
        
        .header-section { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 50px; padding-top: 10px; 
        }

        .app-title { 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -0.04em; 
            line-height: 1.2; display: flex; align-items: center;
        }
        .app-title span { color: var(--accent); margin-left: 2px; text-shadow: 0 0 30px var(--accent-glow); }

        .search-container { position: relative; width: 400px; }
        .search-bar {
            width: 100%; background: var(--surface-low); border: 1px solid var(--border);
            padding: 16px 28px; border-radius: 14px; color: #fff; outline: none;
            font-size: 1rem;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); background: var(--surface-high); }

        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 40px; }
        
        .manga-card {
            aspect-ratio: 2/3; background-size: cover; background-position: center;
            border-radius: 20px; position: relative; cursor: pointer;
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        .manga-card:hover { transform: translateY(-12px) scale(1.03); border-color: var(--accent); }
        
        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(5,5,7,1) 0%, rgba(5,5,7,0.4) 45%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 25px;
        }
        .card-overlay h3 { margin: 0; font-size: 1.1rem; font-weight: 800; line-height: 1.3; }
        .card-overlay p { margin: 6px 0 0; font-size: 0.8rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .collection-tag {
            position: absolute; top: 18px; right: 18px;
            background: var(--accent); color: #000; font-size: 11px;
            font-weight: 900; padding: 5px 12px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-premium {
            background: var(--accent); color: #000; border: none; padding: 14px 28px;
            border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.95rem;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }

        .view { display: none; }
        .view.active { display: block; animation: viewSlide 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes viewSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .notes-layout { display: grid; grid-template-columns: 340px 1fr; gap: 30px; height: 78vh; }
        #NotesList { background: var(--surface-low); border-radius: 24px; padding: 25px; overflow-y: auto; border: 1px solid var(--border); }
        #NoteEditor { 
            background: var(--surface-low); border: 1px solid var(--border); border-radius: 24px;
            padding: 50px; color: #fff; font-family: 'Fira Code', monospace; font-size: 1.15rem;
            resize: none; outline: none; line-height: 1.9;
        }

        #ReaderOverlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
        #ReaderOverlay.active { display: flex; }
        #ReaderImg { max-height: 100vh; max-width: 100vw; object-fit: contain; cursor: pointer; }
        
        .reader-hud {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(15,15,19,0.9); backdrop-filter: blur(25px);
            padding: 15px 35px; border-radius: 100px; border: 1px solid var(--border);
            display: flex; gap: 35px; align-items: center; opacity: 0;
        }
        #ReaderOverlay:hover .reader-hud { opacity: 1; }

        #Modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: var(--surface-high); padding: 45px; border-radius: 28px;
            width: 440px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .input-dark {
            width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
            padding: 18px; border-radius: 14px; color: #fff; margin: 25px 0; font-size: 1rem;
        }
    </style>
</head>
<body>

    <nav id="Sidebar">
        <div class="nav-item active" data-tab="mangas"><i>M</i> <span>Manga</span></div>
        <div class="nav-item" data-tab="anime"><i>A</i> <span>Anime</span></div>
        <div class="nav-item" data-tab="anime"><i>N</i> <span>Novel</span></div>
        <div class="nav-item" data-tab="notes"><i>F</i> <span>Notes</span></div>
        
        <div style="margin-top: auto;">
            <div class="nav-item" onclick="openCreateModal()"><i>➕</i> <span>New Collection</span></div>
        </div>
    </nav>

    <main>
        <section id="mangasView" class="view active">
            <div class="header-section">
                <div class="app-title">ÁNIME&#x108;IKA<span>ZUN</span></div>
                <div class="search-container">
                    <input type="text" id="SearchInput" class="search-bar" placeholder="Search Title...">
                </div>
            </div>
            <div id="MangaGrid" class="manga-grid"></div>
        </section>

        <section id="notesView" class="view">
            <div class="header-section">
                <div class="app-title">WORK<span>SPACE</span></div>
                <button class="btn-premium" onclick="Notes.new()">+ New Page</button>
            </div>
            <div class="notes-layout">
                <div id="NotesList"></div>
                <textarea id="NoteEditor" placeholder="Begin writing your thoughts..."></textarea>
            </div>
        </section>
    </main>

    <div id="ReaderOverlay">
        <img id="ReaderImg" alt="Manga Page">
        <div class="reader-hud">
            <span id="PageInfo" style="font-weight: 900; color: var(--accent);">PAGE 1</span>
            <button class="btn-premium" style="padding: 6px 16px; font-size: 0.8rem;" onclick="Reader.setAsCover()">SET AS COVER</button>
            <span style="color: var(--text-dim); cursor:pointer; font-weight: 600;" onclick="Reader.close()">EXIT (ESC)</span>
        </div>
    </div>

    <div id="Modal">
        <div class="modal-content">
            <h2 id="ModalTitle" style="margin:0;">New Collection</h2>
            <input type="text" id="ModalInput" class="input-dark" placeholder="Name...">
            <div style="display:flex; gap:12px;">
                <button class="btn-premium" style="flex:1" id="ModalConfirm">Confirm</button>
                <button class="btn-premium" style="flex:1; background: #222; color: #fff" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ADD TRASH LATER
        // "PREMIUM" SEARCH ENGINE SHOULD BE UPDATED
        const CORE = {
            state: { library: null },
            
            async init() {
                try {
                    const res = await fetch('/api/library');
                    this.state.library = await res.json();
                    this.renderManga();
                    this.setupTabs();
                } catch (err) {
                    console.error("Initialization failed:", err);
                }
            },
    
            setupTabs() {
                document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
                    btn.onclick = () => {
                        const tab = btn.dataset.tab;
                        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                        document.getElementById(tab + 'View').classList.add('active');
                        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                        btn.classList.add('active');
                        if(tab === 'notes') Notes.load();
                    }
                });
            },
    
            renderManga(filter = "") {
                const grid = document.getElementById('MangaGrid');
                grid.innerHTML = '';
                
                // Combine collections and loose mangas
                const items = [...this.state.library.collections, ...this.state.library.mangas];
                
                items.forEach(item => {
                    // Determine Display Name (Alias if exists, otherwise the cleaned filename)
                    const displayName = item.alias || item.name;
    
                    if(filter && !displayName.toLowerCase().includes(filter.toLowerCase())) return;
                    
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    
                    const progress = localStorage.getItem(`progress_${item.path}`) || 0;
                    const thumb = item.meta?.coverFile || item.path;
                    const page = item.meta?.coverPage !== undefined ? item.meta.coverPage : progress;
                    
                    card.style.backgroundImage = `url('/render-manga?file=${encodeURIComponent(thumb)}&page=${page}')`;
                    
                    card.innerHTML = `
                        ${item.items ? `<div class="collection-tag">COLLECTION</div>` : ''}
                        <div class="card-overlay">
                            <p>${item.items ? item.items.length + ' VOLUMES' : 'STANDALONE'}</p>
                            <h3>${displayName}</h3>
                        </div>
                    `;
    
                    // --- CONTEXT MENU (RIGHT CLICK) ---
                    card.oncontextmenu = (e) => {
                        e.preventDefault();
                        if(item.items) {
                            openRenameModal(item.name, item.path); // Rename actual folder
                        } else {
                            openMangaRenameModal(displayName, item.path); // Set display alias
                        }
                    };
    
                    // --- DRAG & DROP LOGIC ---
                    if(!item.items) {
                        card.draggable = true;
                        card.ondragstart = (e) => e.dataTransfer.setData('source', item.path);
                    } else {
                        card.ondragover = (e) => { e.preventDefault(); card.style.borderColor = 'var(--accent)'; };
                        card.ondragleave = () => card.style.borderColor = 'var(--border)';
                        card.ondrop = async (e) => {
                            const source = e.dataTransfer.getData('source');
                            await fetch('/api/move', { 
                                method: 'PUT', headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ source, targetDir: item.path }) 
                            });
                            CORE.init();
                        };
                    }
    
                    card.onclick = () => {
                        if(item.items) this.renderCollection(item);
                        else Reader.open(item.path, progress);
                    };
                    grid.appendChild(card);
                });
            },
    
            renderCollection(col) {
                const grid = document.getElementById('MangaGrid');
                grid.innerHTML = `<div class="btn-premium" style="grid-column: 1/-1; width: fit-content; margin-bottom: 20px;" onclick="CORE.renderManga()">← Back to Library</div>`;
                col.items.forEach(m => {
                    const mDisplayName = m.alias || m.name;
                    const mCard = document.createElement('div');
                    mCard.className = 'manga-card';
                    const prog = localStorage.getItem(`progress_${m.path}`) || 0;
                    
                    mCard.style.backgroundImage = `url('/render-manga?file=${encodeURIComponent(m.path)}&page=${prog}')`;
                    mCard.innerHTML = `<div class="card-overlay"><h3>${mDisplayName}</h3></div>`;
                    
                    mCard.oncontextmenu = (e) => {
                        e.preventDefault();
                        openMangaRenameModal(mDisplayName, m.path);
                    };
                    
                    mCard.onclick = () => Reader.open(m.path, prog, false, col.path);
                    grid.appendChild(mCard);
                });
            }
        };
    
        const Reader = {
            state: { path: null, page: 0, parent: null },
            
            open(path, page, isCol, parent) {
                this.state = { path, page: parseInt(page), parent };
                document.getElementById('ReaderOverlay').classList.add('active');
                this.render();
            },
            
            render() {
                const img = document.getElementById('ReaderImg');
                img.src = `/render-manga?file=${encodeURIComponent(this.state.path)}&page=${this.state.page}`;
                document.getElementById('PageInfo').innerText = `PAGE ${this.state.page + 1}`;
                localStorage.setItem(`progress_${this.state.path}`, this.state.page);
            },
            
            next() { this.state.page++; this.render(); },
            prev() { if(this.state.page > 0) { this.state.page--; this.render(); } },
            
            close() { 
                document.getElementById('ReaderOverlay').classList.remove('active'); 
                CORE.init(); 
            },
            
            async setAsCover() {
                if(!this.state.parent) return alert("Open a volume within a collection to set the collection cover.");
                await fetch('/api/collections/cover', {
                    method: 'PUT', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        collectionPath: this.state.parent, 
                        coverFile: this.state.path, 
                        coverPage: this.state.page 
                    })
                });
                alert("Collection cover updated successfully.");
            }
        };
    
        // Reader Interaction: Single click (Next), Double click (Prev)
        let clickTimer = null;
        document.getElementById('ReaderImg').onclick = () => {
            if (clickTimer == null) {
                clickTimer = setTimeout(() => {
                    clickTimer = null;
                    Reader.next();
                }, 250);
            } else {
                clearTimeout(clickTimer);
                clickTimer = null;
                Reader.prev();
            }
        };
    
        // Keyboard controls
        window.onkeydown = (e) => {
            if(!document.getElementById('ReaderOverlay').classList.contains('active')) return;
            if(e.key === 'ArrowRight' || e.key === ' ') Reader.next();
            if(e.key === 'ArrowLeft') Reader.prev();
            if(e.key === 'Escape') Reader.close();
        };
    
        // --- MODAL & RENAMING LOGIC ---
        function closeModal() { document.getElementById('Modal').style.display = 'none'; }
    
        // Logic for creating folders
        function openCreateModal() {
            const m = document.getElementById('Modal');
            m.style.display = 'flex';
            document.getElementById('ModalInput').value = "";
            document.getElementById('ModalTitle').innerText = "Create New Collection";
            document.getElementById('ModalConfirm').onclick = async () => {
                const name = document.getElementById('ModalInput').value;
                if(!name) return;
                await fetch('/api/collections', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name })
                });
                closeModal(); CORE.init();
            };
        }
    
        // Logic for renaming folders (Collections)
        function openRenameModal(oldName, path) {
            const m = document.getElementById('Modal');
            m.style.display = 'flex';
            document.getElementById('ModalInput').value = oldName;
            document.getElementById('ModalTitle').innerText = "Rename Collection";
            document.getElementById('ModalConfirm').onclick = async () => {
                const newName = document.getElementById('ModalInput').value;
                if(!newName) return;
                await fetch('/api/collections/rename', {
                    method: 'PUT', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ path, newName })
                });
                closeModal(); CORE.init();
            };
        }
    
        // Logic for setting Display Aliases (Manga files)
        function openMangaRenameModal(oldName, path) {
            const m = document.getElementById('Modal');
            m.style.display = 'flex';
            document.getElementById('ModalInput').value = oldName;
            document.getElementById('ModalTitle').innerText = "Set Display Name";
            document.getElementById('ModalConfirm').onclick = async () => {
                const newName = document.getElementById('ModalInput').value;
                if(!newName) return;
                await fetch('/api/manga/rename', {
                    method: 'PUT', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ path, newName })
                });
                closeModal(); CORE.init();
            };
        }
    
        // --- NOTES ENGINE ---
        const Notes = {
            state: { current: null, tout: null },
    
            async load() {
                const res = await fetch('/api/notes');
                const list = await res.json();
                const container = document.getElementById('NotesList');
                container.innerHTML = '<h3 style="margin-top:0; color:var(--accent);">Documents</h3>';
                list.forEach(n => {
                    const d = document.createElement('div');
                    d.className = 'nav-item';
                    d.style.borderRadius = '12px';
                    d.style.marginBottom = '8px';
                    d.innerText = n.title;
                    d.onclick = () => this.open(n.id);
                    container.appendChild(d);
                });
            },
    
            async open(id) {
                const res = await fetch(`/api/notes/${id}`);
                const data = await res.json();
                this.state.current = id;
                const editor = document.getElementById('NoteEditor');
                editor.value = data.content;
                editor.oninput = () => {
                    clearTimeout(this.state.tout);
                    this.state.tout = setTimeout(() => this.save(), 1000);
                }
            },
    
            async save() {
                if(!this.state.current) return;
                await fetch('/api/notes', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        title: this.state.current.replace('.txt', ''), 
                        content: document.getElementById('NoteEditor').value 
                    })
                });
            },
    
            new() {
                const title = prompt("Enter Page Title:");
                if(title) {
                    this.state.current = title + ".txt";
                    document.getElementById('NoteEditor').value = "";
                    this.save().then(() => this.load());
                }
            }
        };
    
        // Global Search listener
        document.getElementById('SearchInput').oninput = (e) => CORE.renderManga(e.target.value);
    
        // Initial Load
        CORE.init();
    </script>

</body>
</html>
