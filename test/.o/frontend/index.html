<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AnimeCloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-purple-100 via-pink-100 to-blue-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="p-6 flex justify-between items-center backdrop-blur-md bg-white/30 shadow-soft rounded-b-3xl sticky top-0 z-50">
    <h1 class="text-3xl font-bold text-purple-700">🌸 AnimeCloud</h1>
    <input id="search"
      class="px-4 py-2 rounded-full bg-white/60 shadow-inner focus:outline-none focus:ring-2 focus:ring-purple-300"
      placeholder="Search manga...">
  </header>

  <!-- Manga Grid -->
  <main class="p-8">
    <div id="mangaGrid" class="grid gap-8 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6">
      <!-- Manga cards will appear here -->
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
