<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaFlow Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: white; }
        .squishy-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .squishy-card:hover { transform: scale(1.05) translateY(-5px); background: rgba(255,255,255,0.08); }
        .glass-nav { background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">
    <nav class="glass-nav fixed top-0 left-0 w-full z-50 px-8 py-3 flex justify-between items-center">
        <div class="text-xl font-extrabold text-indigo-500 tracking-tighter">MANGAFLOW</div>
        <select id="LibraryPicker" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm outline-none hover:bg-white/10 transition cursor-pointer"></select>
    </nav>

    <main class="mt-20 max-w-7xl mx-auto">
        <section id="HeroSection" class="mb-16 hidden">
            <h2 class="text-xs font-bold text-indigo-400 uppercase tracking-[0.2em] mb-4">Jump Back In</h2>
            <div id="RecentGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <div id="CollectionsContainer"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
