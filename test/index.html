<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Anime Centre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: white; min-height: 100vh; }
        .squishy-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .squishy-card:hover { transform: scale(1.05) translateY(-5px); background: rgba(255,255,255,0.08); border-color: rgba(99, 102, 241, 0.3); }
        .glass-nav { background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        select option { background: #1a1a1e; color: white; }
        
        /* Loading Spinner */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: #6366f1;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #ReaderContent::-webkit-scrollbar { width: 4px; }
        #ReaderContent::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        #ReaderContent img, #ActivePage {
            pointer-events: none;
            user-select: none;
        }
        #ReaderContent {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <nav class="glass-nav fixed top-0 left-0 w-full z-50 px-8 py-3 flex justify-between items-center">
        <div class="text-xl font-extrabold tracking-tighter text-indigo-500">MANGA<span class="text-white">ĈIKA</span></div>
        <select id="LibraryPicker" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold outline-none hover:bg-white/10 transition cursor-pointer"></select>
    </nav>

    <main class="mt-20 max-w-7xl mx-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 id="ViewTitle" class="text-3xl font-extrabold tracking-tight text-white">Your Library</h1>
                <p id="ViewSub" class="text-gray-500 text-sm mt-1">Let's get a-readin' :P</p>
            </div>
            <button id="BackBtn" onclick="ShowCollections()" class="hidden bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg text-xs font-bold transition">← BACK</button>
        </header>

        <section id="HeroSection" class="mb-16 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xs font-bold text-indigo-400 uppercase tracking-[0.2em]">Jump Back In</h2>
                <button id="SeeAllRecent" class="text-[10px] font-bold text-gray-500 hover:text-indigo-400 uppercase tracking-widest transition">See History</button>
            </div>
            <div id="RecentGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <div id="CollectionsContainer" class="space-y-12"></div>
    </main>

    <div id="ReaderOverlay" class="fixed inset-0 z-[100] bg-black hidden flex flex-col overflow-hidden">
        <div id="ReaderContent" class="absolute inset-0 z-0 overflow-y-auto overflow-x-hidden flex flex-col items-center"></div>
    
        <div id="ReaderHud" class="absolute inset-0 z-10 bg-black/80 backdrop-blur-md flex flex-col justify-between p-10 opacity-0 pointer-events-none transition-opacity duration-200">
            <div class="flex justify-between items-start">
                <div>
                    <h2 id="ReaderTitle" class="text-3xl font-black text-white">Title</h2>
                    <p class="text-indigo-400 font-bold text-xs uppercase tracking-[0.3em] mt-2">Immersive Mode</p>
                </div>
                <button onclick="CloseReader()" class="text-xs font-bold text-gray-400 hover:text-white transition tracking-widest">CLOSE [ESC]</button>
            </div>
    
            <div class="flex flex-col items-center gap-8">
                <div class="flex bg-white/5 p-1 rounded-2xl border border-white/10">
                    <button id="BtnScroll" onclick="SetReaderMode('scroll')" class="px-8 py-3 rounded-xl text-xs font-bold transition text-white">SCROLL</button>
                    <button id="BtnPage" onclick="SetReaderMode('page')" class="px-8 py-3 rounded-xl text-xs font-bold transition text-white">PAGE</button>
                </div>
                <div class="w-full max-w-2xl bg-white/10 h-1.5 rounded-full overflow-hidden">
                    <div id="ReaderProgress" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
                </div>
                <span id="PageCounter" class="text-xs font-mono text-gray-500">0 / 0</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
